services:
  db:
    image: postgres:16-alpine
    container_name: chat-api-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat
    ports:
      - "5433:5432"
    volumes:
      - chat_api_pgdata:/var/lib/postgresql/data

volumes:
  chat_api_pgdata:
